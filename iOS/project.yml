name: Tailmeds
options:
  bundleIdPrefix: com.shimondeitel.petallergy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Tailmeds:
    type: application
    platform: iOS
    sources:
      - path: Tailmeds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petallergy
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tailmeds/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TailmedsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TailmedsTests
      - path: Tailmeds.storekit
    dependencies:
      - target: Tailmeds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petallergy.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TailmedsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TailmedsUITests
    dependencies:
      - target: Tailmeds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petallergy.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Tailmeds:
    build:
      targets:
        Tailmeds: all
        TailmedsTests: [test]
        TailmedsUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Tailmeds.storekit
    test:
      config: Debug
      storeKitConfiguration: Tailmeds.storekit
      targets:
        - TailmedsTests
        - TailmedsUITests
    archive:
      config: Release
